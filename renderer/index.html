<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'"
    />
    <title>Port Killer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="toolbar-brand">
          <h1 class="title">Port Killer</h1>
          <p class="tagline">TCP listeners · filter · end process by PID</p>
        </div>
        <div class="toolbar-actions" role="group" aria-label="Primary actions">
          <button type="button" class="btn btn-danger" id="free-protected-btn" title="Kill processes listening on favorite ports">
            Kill favorite ports
          </button>
          <button type="button" class="btn btn-ghost" id="check-updates-btn" title="Query GitHub for a newer release">
            Check updates
          </button>
          <button type="button" class="btn btn-primary" id="refresh-btn" title="Reload port list">Refresh</button>
        </div>
      </header>

      <section class="filters-panel" aria-label="Filters">
        <div class="filters-row">
          <label class="sr-only" for="filter-input">Filter by port, address, PID, or name</label>
          <input
            id="filter-input"
            class="filter-input"
            type="search"
            placeholder="Filter by port, address, PID, or name…"
            autocomplete="off"
            spellcheck="false"
          />
          <span class="badge" id="count-badge" aria-live="polite">0 entries</span>
        </div>
        <div class="filters-row filters-row--options">
          <label class="check-label" title="Show IANA well-known / privileged range (1–1023)">
            <input type="checkbox" id="show-system-ports" />
            <span>Show system ports</span>
          </label>
          <div class="filter-group" title="Typical local dev: Angular, Vite, CRA, webpack, etc.">
            <label class="check-label check-label--block">
              <input type="checkbox" id="dev-manual-ports-only" checked />
              <span>Dev / manual ports only</span>
            </label>
            <input
              type="text"
              class="extra-ports-input"
              id="extra-dev-ports"
              placeholder="Extra ports: 9000, 7777"
              inputmode="numeric"
              autocomplete="off"
              spellcheck="false"
              disabled
            />
          </div>
        </div>
        <div class="filters-row filters-row--options">
          <div class="settings-group">
            <button type="button" class="btn btn-ghost btn-favorite-ports" id="protected-ports-btn" title="Edit favorite ports">
              ★ Favorite ports
            </button>
          </div>
          <label class="check-label" title="Use taskkill /T so child processes are stopped too">
            <input type="checkbox" id="kill-tree-input" />
            <span>Kill process tree</span>
          </label>
          <div class="settings-group settings-group--delay">
            <label class="field-label" for="kill-delay-input">Delay (sec)</label>
            <input id="kill-delay-input" class="delay-input" type="number" min="0" max="30" step="1" />
          </div>
          <label class="check-label" title="Hide window to tray instead of closing the app">
            <input type="checkbox" id="minimize-to-tray-input" />
            <span>Minimize to tray on close</span>
          </label>
        </div>
      </section>

      <div class="status-bar" id="status-bar" role="status" aria-live="polite"></div>
      <section class="update-panel" id="update-panel" hidden aria-live="polite">
        <p class="update-panel__text" id="update-text"></p>
        <progress class="update-panel__progress" id="update-progress" max="100" value="0" hidden></progress>
        <button type="button" class="btn btn-primary update-panel__install-btn" id="install-update-btn" hidden>
          Install update
        </button>
      </section>
      <div class="kill-queue" id="kill-queue" hidden></div>

      <div class="table-wrap" role="region" aria-label="Listening ports" tabindex="0">
        <div class="loading-overlay" id="loading" hidden>
          <div class="spinner" aria-hidden="true"></div>
          <p>Scanning…</p>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th scope="col">Port</th>
              <th scope="col">Address</th>
              <th scope="col">PID</th>
              <th scope="col">Process</th>
              <th scope="col">State</th>
              <th scope="col" class="col-favorite th-favorite">Favorite</th>
              <th scope="col" class="col-action th-action">Action</th>
            </tr>
          </thead>
          <tbody id="rows-body"></tbody>
        </table>
        <p class="empty-hint" id="empty-hint" hidden>No matching ports.</p>
      </div>
      <section class="history-panel" aria-label="Kill history">
        <div class="history-head">
          <h2>Kill history</h2>
          <button type="button" class="btn btn-ghost btn-history-refresh" id="history-refresh-btn">Refresh history</button>
        </div>
        <ul class="history-list" id="history-list">
          <li class="history-empty">No actions yet.</li>
        </ul>
      </section>
    </div>
    <div class="modal-backdrop" id="protected-ports-modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="protected-ports-modal-title">
        <h3 id="protected-ports-modal-title">Favorite ports</h3>
        <p class="modal-copy">Add ports one by one. Click a card to remove it.</p>
        <div class="favorite-ports-list" id="favorite-ports-list" aria-live="polite"></div>
        <div class="favorite-ports-entry">
          <input
            id="protected-ports-modal-input"
            class="delay-input favorite-port-input"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            placeholder="Add port"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" class="btn btn-primary" id="protected-ports-add-btn">Add</button>
        </div>
        <div class="modal-presets" aria-label="Common ports">
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="3000">3000</button>
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="4200">4200</button>
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="5173">5173</button>
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="8080">8080</button>
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="9229">9229</button>
          <button type="button" class="btn btn-ghost btn-chip" data-port-chip="clear">Clear</button>
        </div>
        <p class="modal-feedback" id="protected-ports-modal-feedback" aria-live="polite"></p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="protected-ports-cancel-btn">Cancel</button>
          <button type="button" class="btn btn-primary" id="protected-ports-save-btn">Save</button>
        </div>
      </div>
    </div>
    <script src="renderer.js" defer></script>
  </body>
</html>
